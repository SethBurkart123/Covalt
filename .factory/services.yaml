commands:
  install: bun install --frozen-lockfile && uv sync
  install_js: bun install --frozen-lockfile
  install_python: uv sync
  lint: bun run ci:lint
  lint_python: uv run --group dev ruff check backend/ tests/ main.py
  lint_python_report: bun run ci:lint-python:report
  test_vitest: bun run ci:vitest
  test_pytest: bun run ci:pytest
  test_playwright: bun run ci:playwright
  test_playwright_reuse: bun run test:e2e:reuse
  test_playwright_exclusive: bun run test:e2e:exclusive
  test: bun run ci:lint && bun run ci:vitest && bun run ci:pytest
  test_full: bun run ci:full
  build: bun run build

services:
  backend:
    start: COVALT_BACKEND_PORT=3100 COVALT_DEV_MODE=1 COVALT_GENERATE_TS=1 uv run main.py
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3100/
    port: 3100
    depends_on: []

  frontend:
    start: PORT=3101 bun run dev:frontend
    stop: lsof -ti :3101 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3101/
    port: 3101
    depends_on: [backend]
