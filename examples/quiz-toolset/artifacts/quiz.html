<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .progress-bar-track {
      position: sticky;
      top: 0;
      height: 4px;
      background: #e8e8e8;
      z-index: 10;
    }

    .progress-bar-fill {
      height: 100%;
      background: #2ec26a;
      border-radius: 0 2px 2px 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 3rem 1.5rem 2rem;
      min-height: calc(100vh - 4px);
      display: flex;
      flex-direction: column;
    }

    .question-counter {
      font-size: 0.8125rem;
      color: #888;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    .hint-text {
      font-size: 0.8125rem;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .answers-list {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      margin-bottom: auto;
    }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
      margin-bottom: auto;
    }

    .answer-btn {
      background: #f5f5f5;
      border: 2px solid transparent;
      border-radius: 999px;
      padding: 0.75rem 1.25rem;
      font-size: 0.9375rem;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
      font-family: inherit;
      line-height: 1.4;
    }

    .answer-btn:hover:not(:disabled):not(.correct):not(.incorrect) {
      background: #ebebeb;
    }

    .answer-btn.selected {
      background: #e8f5ee;
      border-color: #2ec26a;
    }

    .answer-btn:disabled { cursor: default; }

    .answer-btn.correct {
      background: #e8f5ee;
      border-color: #2ec26a;
      color: #1a7a3a;
    }

    .answer-btn.incorrect {
      background: #fef2f2;
      border-color: #ef4444;
      color: #b91c1c;
    }

    .answer-btn.reveal {
      background: #e8f5ee;
      border-color: #2ec26a;
      color: #1a7a3a;
      opacity: 0.7;
    }

    .answer-btn.correct .icon,
    .answer-btn.reveal .icon { color: #2ec26a; }
    .answer-btn.incorrect .icon { color: #ef4444; }

    .icon {
      display: inline-block;
      margin-right: 0.375rem;
      font-weight: 700;
    }

    .text-input-wrap {
      margin-bottom: auto;
    }

    .text-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .text-input:focus { border-color: #2ec26a; }
    .text-input:disabled { background: #f5f5f5; }
    .text-input.correct { border-color: #2ec26a; background: #e8f5ee; }
    .text-input.incorrect { border-color: #ef4444; background: #fef2f2; }

    .feedback {
      text-align: center;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9375rem;
      margin-top: 1.5rem;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feedback.correct { background: #e8f5ee; color: #1a7a3a; }
    .feedback.incorrect { background: #fef2f2; color: #b91c1c; }

    .bottom-bar {
      padding-top: 1.5rem;
      margin-top: 1.5rem;
    }

    .check-btn {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
      background: #e8e8e8;
      color: #999;
    }

    .check-btn.active {
      background: #2ec26a;
      color: #fff;
    }

    .check-btn.active:hover {
      background: #27a85d;
    }

    .check-btn:disabled:not(.active) {
      cursor: default;
    }

    .check-btn.next {
      background: #2ec26a;
      color: #fff;
    }

    .check-btn.next:hover {
      background: #27a85d;
    }

    /* Results */
    .results {
      text-align: center;
      padding: 3rem 1rem;
      animation: slideUp 0.3s ease;
    }

    .results-emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .results-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .results-score {
      font-size: 3rem;
      font-weight: 800;
      color: #2ec26a;
      margin-bottom: 0.25rem;
    }

    .results-detail {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .results-message {
      font-size: 1.125rem;
      color: #1a1a1a;
      margin-bottom: 2.5rem;
    }

    .restart-btn {
      display: inline-block;
      padding: 0.875rem 3rem;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: #f5f5f5;
      color: #1a1a1a;
      transition: background 0.15s ease;
    }

    .restart-btn:hover { background: #ebebeb; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>

  <div class="container">
    <div id="quizArea">
      <p class="question-counter" id="questionCounter">1 of 5</p>
      <p class="question-text" id="questionText"></p>
      <p class="hint-text hidden" id="hintText"></p>
      <div id="answersContainer"></div>
      <div class="feedback hidden" id="feedback"></div>
      <div class="bottom-bar">
        <button class="check-btn" id="checkBtn" disabled>Check</button>
      </div>
    </div>

    <div id="resultsArea" class="hidden">
      <div class="results">
        <div class="results-emoji" id="resultsEmoji"></div>
        <h2 class="results-title">Quiz Complete</h2>
        <div class="results-score" id="resultsScore">0%</div>
        <p class="results-detail" id="resultsDetail"></p>
        <p class="results-message" id="resultsMessage"></p>
        <button class="restart-btn" id="restartBtn">Try again</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var data = window.__TOOL_DATA__ || { title: "Quiz", questions: [] };
      var questions = data.questions || [];

      var currentIndex = 0;
      var score = 0;
      var answered = false;
      var selection = null; // index for MC, Set<int> for MS, bool for TF, string for FIB

      var progressBar = document.getElementById("progressBar");
      var questionCounter = document.getElementById("questionCounter");
      var questionText = document.getElementById("questionText");
      var hintText = document.getElementById("hintText");
      var answersContainer = document.getElementById("answersContainer");
      var feedback = document.getElementById("feedback");
      var checkBtn = document.getElementById("checkBtn");
      var quizArea = document.getElementById("quizArea");
      var resultsArea = document.getElementById("resultsArea");
      var resultsScore = document.getElementById("resultsScore");
      var resultsDetail = document.getElementById("resultsDetail");
      var resultsMessage = document.getElementById("resultsMessage");
      var resultsEmoji = document.getElementById("resultsEmoji");
      var restartBtn = document.getElementById("restartBtn");

      document.title = data.title || "Quiz";

      function init() {
        currentIndex = 0;
        score = 0;
        answered = false;
        selection = null;
        quizArea.classList.remove("hidden");
        resultsArea.classList.add("hidden");
        render();
      }

      function render() {
        if (currentIndex >= questions.length) { showResults(); return; }

        var q = questions[currentIndex];
        var total = questions.length;
        var progress = (currentIndex / total) * 100;

        progressBar.style.width = progress + "%";
        questionCounter.textContent = (currentIndex + 1) + " of " + total;
        questionText.textContent = q.question;

        answered = false;
        selection = null;
        feedback.classList.add("hidden");
        checkBtn.textContent = "Check";
        checkBtn.className = "check-btn";
        checkBtn.disabled = true;

        hintText.classList.add("hidden");
        answersContainer.innerHTML = "";

        var t = q.type || "multiple_choice";

        if (t === "multiple_choice") renderMC(q);
        else if (t === "multiple_select") renderMS(q);
        else if (t === "true_false") renderTF(q);
        else if (t === "fill_in_blank") renderFIB(q);
      }

      // --- Multiple Choice ---
      function renderMC(q) {
        var useGrid = q.answers.length <= 4 && q.answers.every(function (a) { return a.length <= 20; });
        var wrap = document.createElement("div");
        wrap.className = useGrid ? "answers-grid" : "answers-list";

        q.answers.forEach(function (ans, i) {
          var btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.textContent = ans;
          btn.addEventListener("click", function () {
            if (answered) return;
            selection = i;
            updateMCSelection(wrap, i);
            checkBtn.disabled = false;
            checkBtn.className = "check-btn active";
          });
          wrap.appendChild(btn);
        });

        answersContainer.appendChild(wrap);
      }

      function updateMCSelection(wrap, idx) {
        var btns = wrap.querySelectorAll(".answer-btn");
        btns.forEach(function (b, i) {
          b.classList.toggle("selected", i === idx);
        });
      }

      function checkMC(q) {
        var wrap = answersContainer.firstChild;
        var btns = wrap.querySelectorAll(".answer-btn");
        var correct = selection === q.correctIndex;

        btns.forEach(function (b, i) {
          b.disabled = true;
          b.classList.remove("selected");
          if (i === selection) b.classList.add(correct ? "correct" : "incorrect");
          if (i === q.correctIndex && !correct) b.classList.add("reveal");
        });

        if (correct) {
          btns[selection].innerHTML = '<span class="icon">&#10003;</span>' + q.answers[selection];
        } else {
          btns[selection].innerHTML = '<span class="icon">&#10007;</span>' + q.answers[selection];
          btns[q.correctIndex].innerHTML = '<span class="icon">&#10003;</span>' + q.answers[q.correctIndex];
        }

        return correct;
      }

      // --- Multiple Select ---
      function renderMS(q) {
        hintText.textContent = "Select all that apply";
        hintText.classList.remove("hidden");
        selection = new Set();

        var wrap = document.createElement("div");
        wrap.className = "answers-list";

        q.answers.forEach(function (ans, i) {
          var btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.textContent = ans;
          btn.addEventListener("click", function () {
            if (answered) return;
            if (selection.has(i)) { selection.delete(i); } else { selection.add(i); }
            btn.classList.toggle("selected", selection.has(i));
            checkBtn.disabled = selection.size === 0;
            checkBtn.className = selection.size > 0 ? "check-btn active" : "check-btn";
          });
          wrap.appendChild(btn);
        });

        answersContainer.appendChild(wrap);
      }

      function checkMS(q) {
        var wrap = answersContainer.firstChild;
        var btns = wrap.querySelectorAll(".answer-btn");
        var correctSet = new Set(q.correctIndices);
        var isCorrect = selection.size === correctSet.size &&
          Array.from(selection).every(function (i) { return correctSet.has(i); });

        btns.forEach(function (b, i) {
          b.disabled = true;
          b.classList.remove("selected");
          var wasSelected = selection.has(i);
          var shouldBeSelected = correctSet.has(i);

          if (wasSelected && shouldBeSelected) {
            b.classList.add("correct");
            b.innerHTML = '<span class="icon">&#10003;</span>' + q.answers[i];
          } else if (wasSelected && !shouldBeSelected) {
            b.classList.add("incorrect");
            b.innerHTML = '<span class="icon">&#10007;</span>' + q.answers[i];
          } else if (!wasSelected && shouldBeSelected) {
            b.classList.add("reveal");
            b.innerHTML = '<span class="icon">&#10003;</span>' + q.answers[i];
          }
        });

        return isCorrect;
      }

      // --- True / False ---
      function renderTF(q) {
        var wrap = document.createElement("div");
        wrap.className = "answers-grid";

        ["True", "False"].forEach(function (label, i) {
          var val = i === 0;
          var btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.textContent = label;
          btn.style.textAlign = "center";
          btn.addEventListener("click", function () {
            if (answered) return;
            selection = val;
            wrap.querySelectorAll(".answer-btn").forEach(function (b, j) {
              b.classList.toggle("selected", j === i);
            });
            checkBtn.disabled = false;
            checkBtn.className = "check-btn active";
          });
          wrap.appendChild(btn);
        });

        answersContainer.appendChild(wrap);
      }

      function checkTF(q) {
        var wrap = answersContainer.firstChild;
        var btns = wrap.querySelectorAll(".answer-btn");
        var correct = selection === q.correctAnswer;
        var selIdx = selection ? 0 : 1;
        var correctIdx = q.correctAnswer ? 0 : 1;

        btns.forEach(function (b, i) {
          b.disabled = true;
          b.classList.remove("selected");
          if (i === selIdx) b.classList.add(correct ? "correct" : "incorrect");
          if (i === correctIdx && !correct) b.classList.add("reveal");
        });

        if (correct) {
          btns[selIdx].innerHTML = '<span class="icon">&#10003;</span>' + btns[selIdx].textContent;
        } else {
          btns[selIdx].innerHTML = '<span class="icon">&#10007;</span>' + (selection ? "True" : "False");
          btns[correctIdx].innerHTML = '<span class="icon">&#10003;</span>' + (q.correctAnswer ? "True" : "False");
        }

        return correct;
      }

      // --- Fill in the Blank ---
      function renderFIB(q) {
        var wrap = document.createElement("div");
        wrap.className = "text-input-wrap";

        var input = document.createElement("input");
        input.type = "text";
        input.className = "text-input";
        input.placeholder = "Type your answer...";
        input.autocomplete = "off";
        input.addEventListener("input", function () {
          selection = input.value.trim();
          checkBtn.disabled = !selection;
          checkBtn.className = selection ? "check-btn active" : "check-btn";
        });
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !checkBtn.disabled) checkBtn.click();
        });

        wrap.appendChild(input);
        answersContainer.appendChild(wrap);
        input.focus();
      }

      function checkFIB(q) {
        var input = answersContainer.querySelector(".text-input");
        var userAnswer = (selection || "").toLowerCase().trim();
        var correct = q.acceptedAnswers.some(function (a) {
          return a.toLowerCase().trim() === userAnswer;
        });

        input.disabled = true;
        input.classList.add(correct ? "correct" : "incorrect");

        if (!correct) {
          var hint = document.createElement("p");
          hint.style.cssText = "margin-top: 0.75rem; font-size: 0.875rem; color: #1a7a3a;";
          hint.textContent = "Accepted: " + q.acceptedAnswers.join(", ");
          answersContainer.appendChild(hint);
        }

        return correct;
      }

      // --- Check / Next ---
      checkBtn.addEventListener("click", function () {
        if (!answered) {
          answered = true;
          var q = questions[currentIndex];
          var t = q.type || "multiple_choice";
          var correct = false;

          if (t === "multiple_choice") correct = checkMC(q);
          else if (t === "multiple_select") correct = checkMS(q);
          else if (t === "true_false") correct = checkTF(q);
          else if (t === "fill_in_blank") correct = checkFIB(q);

          if (correct) score++;

          feedback.textContent = correct ? "Correct!" : "Not quite.";
          feedback.className = "feedback " + (correct ? "correct" : "incorrect");
          feedback.classList.remove("hidden");

          checkBtn.textContent = currentIndex === questions.length - 1 ? "See results" : "Continue";
          checkBtn.className = "check-btn next";
          checkBtn.disabled = false;
        } else {
          currentIndex++;
          render();
        }
      });

      // --- Results ---
      function showResults() {
        quizArea.classList.add("hidden");
        resultsArea.classList.remove("hidden");
        progressBar.style.width = "100%";

        var pct = Math.round((score / questions.length) * 100);
        resultsScore.textContent = pct + "%";
        resultsDetail.textContent = score + " of " + questions.length + " correct";

        var emoji, msg;
        if (pct === 100) { emoji = "\uD83C\uDF1F"; msg = "Perfect score!"; }
        else if (pct >= 80) { emoji = "\uD83C\uDF89"; msg = "Excellent work!"; }
        else if (pct >= 60) { emoji = "\uD83D\uDC4D"; msg = "Good job, keep going!"; }
        else if (pct >= 40) { emoji = "\uD83D\uDCAA"; msg = "Not bad, keep practicing!"; }
        else { emoji = "\uD83D\uDCDA"; msg = "Keep learning, you'll get there!"; }

        resultsEmoji.textContent = emoji;
        resultsMessage.textContent = msg;
      }

      restartBtn.addEventListener("click", init);

      if (questions.length === 0) {
        questionText.textContent = "No questions available.";
        questionCounter.textContent = "";
        checkBtn.style.display = "none";
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
